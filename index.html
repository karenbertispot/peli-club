<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Peli Club</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8E7;
    --surface: #FFFFFF;
    --surface2: #F5EDD8;
    --border: #D8CDB8;
    --accent: #CFE1E2;
    --accent-dark: #9BBEBF;
    --ink: #341F1A;
    --ink-muted: #7A5F59;
    --ink-light: #B09A94;
    --danger: #C0392B;
    --success: #2E7D5E;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'Fraunces', Georgia, serif; min-height: 100vh; padding-bottom: 80px; }

  header {
    background: var(--ink);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; color: var(--bg); letter-spacing: -0.3px; }
  .logo em { color: var(--accent); font-style: italic; }
  .header-badge { font-size: 11px; font-weight: 400; padding: 4px 12px; border-radius: 20px; background: rgba(255,248,231,0.15); color: var(--bg); border: 1px solid rgba(255,255,255,0.2); font-family: 'Fraunces', serif; }

  .main { max-width: 660px; margin: 0 auto; padding: 24px 16px; }

  .tabs { display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; margin-bottom: 22px; box-shadow: 0 1px 3px rgba(52,31,26,0.06); }
  .tab { flex: 1; padding: 9px 6px; border: none; background: none; color: var(--ink-muted); font-family: 'Fraunces', serif; font-size: 12px; font-weight: 400; border-radius: var(--radius-sm); cursor: pointer; transition: all .2s; }
  .tab.active { background: var(--ink); color: var(--bg); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(52,31,26,0.05); }
  .card-title { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-light); margin-bottom: 16px; font-family: 'Fraunces', serif; }

  .cycle-hero { background: var(--accent); border: 1px solid var(--accent-dark); border-radius: var(--radius); padding: 24px 22px; margin-bottom: 14px; }
  .cycle-num-label { font-size: 12px; color: var(--ink-muted); margin-bottom: 4px; font-style: italic; }
  .cycle-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; color: var(--ink); margin-bottom: 10px; line-height: 1.25; }
  .tipo-badge { display: inline-block; font-size: 11px; font-weight: 400; padding: 4px 12px; border-radius: 20px; font-family: 'Fraunces', serif; }
  .tipo-libre { background: rgba(52,31,26,0.1); color: var(--ink); border: 1px solid rgba(52,31,26,0.2); }
  .tipo-especifica { background: rgba(52,31,26,0.15); color: var(--ink); border: 1px solid rgba(52,31,26,0.25); }

  .phases { display: flex; flex-direction: column; gap: 7px; }
  .phase-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: var(--radius-sm); background: var(--surface2); border: 1px solid var(--border); }
  .phase-row.active-phase { background: var(--ink); border-color: var(--ink); }
  .phase-row.active-phase .phase-name { color: var(--bg); }
  .phase-row.active-phase .phase-date { color: var(--accent); }
  .phase-row.done-phase { opacity: 0.6; }
  .phase-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .phase-row.active-phase .phase-dot { background: var(--accent); }
  .phase-row.done-phase .phase-dot { background: var(--ink-light); }
  .phase-info { flex: 1; }
  .phase-name { font-size: 13px; font-weight: 500; color: var(--ink); }
  .phase-date { font-size: 11px; color: var(--ink-muted); margin-top: 2px; font-style: italic; }
  .phase-tag { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 10px; font-family: 'Fraunces', serif; }
  .tag-active { background: var(--accent); color: var(--ink); }
  .tag-done { background: var(--surface2); color: var(--ink-light); }
  .tag-next { background: var(--surface2); color: var(--ink-light); }

  input[type="text"], input[type="date"], input[type="password"], textarea, select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--ink); font-family: 'Fraunces', serif; font-size: 14px; padding: 11px 14px; margin-bottom: 10px; transition: border-color .2s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--ink); }
  textarea { resize: vertical; min-height: 65px; }
  label.field-label { font-size: 11px; color: var(--ink-muted); display: block; margin-bottom: 5px; font-style: italic; }

  .btn { padding: 11px 22px; border-radius: var(--radius-sm); font-family: 'Fraunces', serif; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--ink); transition: all .2s; }
  .btn:hover { border-color: var(--ink); }
  .btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn-primary:hover { background: #4a2e28; border-color: #4a2e28; }
  .btn-sm { padding: 6px 13px; font-size: 12px; }
  .btn-danger { border-color: var(--danger); color: var(--danger); background: transparent; }
  .btn-danger:hover { background: rgba(192,57,43,0.08); }
  .btn-full { width: 100%; }
  .btn-accent { background: var(--accent); color: var(--ink); border-color: var(--accent-dark); }
  .btn-accent:hover { background: var(--accent-dark); }

  .movie-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .movie-item:last-child { border-bottom: none; }
  .movie-rank { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 300; font-style: italic; color: var(--ink-light); min-width: 28px; line-height: 1; margin-top: 2px; }
  .movie-body { flex: 1; min-width: 0; }
  .movie-title-text { font-size: 15px; font-weight: 500; color: var(--ink); }
  .movie-year { color: var(--ink-muted); font-size: 13px; font-style: italic; }
  .movie-note { font-size: 12px; color: var(--ink-muted); margin-top: 3px; font-style: italic; }
  .movie-by { font-size: 11px; color: var(--ink-light); margin-top: 4px; }

  /* VOTE RADIO STYLE */
  .vote-option { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); margin-bottom: 8px; cursor: pointer; transition: all .2s; }
  .vote-option:hover { border-color: var(--ink-muted); }
  .vote-option.selected { border-color: var(--ink); background: var(--surface2); }
  .vote-option input[type="radio"] { display: none; }
  .vote-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .vote-option.selected .vote-radio { border-color: var(--ink); background: var(--ink); }
  .vote-option.selected .vote-radio::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--bg); display: block; }
  .vote-movie-title { font-size: 14px; font-weight: 500; color: var(--ink); }
  .vote-movie-year { font-size: 12px; color: var(--ink-muted); font-style: italic; }

  /* RESULT BARS (only shown when revealed) */
  .vote-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin: 6px 0 3px; }
  .vote-bar-fill { height: 4px; border-radius: 2px; background: var(--ink); transition: width .6s; }
  .vote-count { font-size: 11px; color: var(--ink-muted); font-style: italic; }

  .winner-card { background: var(--ink); border-radius: var(--radius); padding: 28px 22px; margin-bottom: 14px; text-align: center; }
  .winner-trophy { font-size: 40px; margin-bottom: 10px; }
  .winner-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); margin-bottom: 8px; font-family: 'Fraunces', serif; }
  .winner-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; color: var(--bg); line-height: 1.2; }
  .winner-year { font-size: 14px; color: var(--accent); margin-top: 6px; font-style: italic; }

  .notice { font-size: 12px; color: var(--ink-muted); background: var(--surface2); border-radius: var(--radius-sm); padding: 11px 14px; border-left: 3px solid var(--accent-dark); margin-top: 10px; font-style: italic; }
  .notice-success { border-left-color: var(--success); }

  .empty { text-align: center; padding: 36px 16px; color: var(--ink-light); font-size: 14px; font-style: italic; }
  .empty-icon { font-size: 34px; margin-bottom: 10px; }
  .loading { text-align: center; padding: 60px 16px; color: var(--ink-muted); font-size: 14px; font-style: italic; }

  .admin-toggle { font-size: 11px; color: var(--ink-light); cursor: pointer; text-decoration: underline; text-align: right; margin-bottom: 10px; font-style: italic; }
  .admin-section { display: none; }
  .admin-section.visible { display: block; }

  .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ARCHIVE */
  .archive-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 16px; }
  .archive-num { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 300; font-style: italic; color: var(--ink-light); min-width: 40px; line-height: 1; }
  .archive-body { flex: 1; }
  .archive-winner-title { font-size: 16px; font-weight: 500; color: var(--ink); }
  .archive-tema { font-size: 12px; color: var(--ink-muted); margin-top: 3px; font-style: italic; }
  .archive-tipo { font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 10px; margin-top: 8px; display: inline-block; background: var(--accent); color: var(--ink); border: 1px solid var(--accent-dark); }

  .cycle-selector { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cycle-selector h3 { font-size: 11px; font-weight: 500; color: var(--ink-light); text-transform: uppercase; letter-spacing: .08em; }
  .cycle-selector select { width: auto; margin: 0; font-size: 12px; padding: 6px 10px; }

  .meeting-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius-sm); background: var(--accent); border: 1px solid var(--accent-dark); margin-top: 8px; }
  .meeting-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink); flex-shrink: 0; }
  .meeting-label { font-size: 11px; color: var(--ink-muted); font-style: italic; }
  .meeting-date { font-size: 13px; font-weight: 500; color: var(--ink); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .confirmation-box { background: var(--accent); border: 1px solid var(--accent-dark); border-radius: var(--radius); padding: 28px 22px; text-align: center; }
  .confirmation-icon { font-size: 40px; margin-bottom: 10px; }
  .confirmation-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
  .confirmation-sub { font-size: 13px; color: var(--ink-muted); font-style: italic; }

  /* ADMIN LOGIN */
  .admin-login-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 14px; }

  @media (max-width: 480px) {
    .date-grid { grid-template-columns: 1fr; }
    .cycle-title { font-size: 22px; }
    .tab { font-size: 11px; padding: 8px 4px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">🎬 Peli<em>Club</em></div>
  <div class="header-badge" id="headerBadge">Cargando...</div>
</header>
<div class="main" id="appContent">
  <div class="loading">Cargando el club... 🍿</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCg_bvsEj2gQ5RBMIzbcOMGOV_-OWl_62s",
  authDomain: "peliclub-fbff4.firebaseapp.com",
  projectId: "peliclub-fbff4",
  storageBucket: "peliclub-fbff4.firebasestorage.app",
  messagingSenderId: "130071169705",
  appId: "1:130071169705:web:a7115ea583e12c292a37b8",
  measurementId: "G-SK3DVHNRQD"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASS = '1234';
const STORAGE_KEY_VOTED = 'peliclub_voted_'; // + cycleId

let currentTab = 'ciclo';
let adminUnlocked = false;
let adminVisible = false;
let currentCycleId = null;
let activeCycleData = null;
let movies = [];
let allCycles = [];
let archivedCycles = [];
let selectedVoteId = null;
let unsubCycle = null, unsubMovies = null, unsubCycles = null;

// ─── HELPERS ───────────────────────────────────────────────
function addDays(dateStr, n) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function fmt(dateStr) {
  if (!dateStr) return '—';
  const [y, m, d] = dateStr.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]}`;
}
function getPhaseStatus(start, end) {
  if (!start) return 'next';
  const today = new Date().toISOString().split('T')[0];
  if (today < start) return 'next';
  if (today > end) return 'done';
  return 'active';
}
function hasVoted() {
  return !!localStorage.getItem(STORAGE_KEY_VOTED + currentCycleId);
}
function markVoted(alias) {
  localStorage.setItem(STORAGE_KEY_VOTED + currentCycleId, alias || 'anónima');
}
function getVotedAlias() {
  return localStorage.getItem(STORAGE_KEY_VOTED + currentCycleId);
}

// ─── RENDER SHELL ──────────────────────────────────────────
function renderApp() {
  document.getElementById('appContent').innerHTML = `
    <div class="tabs">
      <button class="tab ${currentTab==='ciclo'?'active':''}" onclick="switchTab('ciclo')">🗓 Ciclo</button>
      <button class="tab ${currentTab==='postular'?'active':''}" onclick="switchTab('postular')">📽 Postular</button>
      <button class="tab ${currentTab==='votar'?'active':''}" onclick="switchTab('votar')">🗳 Votar</button>
      <button class="tab ${currentTab==='resultado'?'active':''}" onclick="switchTab('resultado')">🏆 Resultado</button>
      <button class="tab ${currentTab==='archivo'?'active':''}" onclick="switchTab('archivo')">📁 Archivo</button>
    </div>
    <div id="tabContent"></div>
  `;
  renderTab();
}

function renderTab() {
  const el = document.getElementById('tabContent');
  if (!el) return;
  if (currentTab === 'ciclo') el.innerHTML = renderCicloTab();
  else if (currentTab === 'postular') el.innerHTML = renderPostularTab();
  else if (currentTab === 'votar') el.innerHTML = renderVotarTab();
  else if (currentTab === 'resultado') el.innerHTML = renderResultadoTab();
  else if (currentTab === 'archivo') el.innerHTML = renderArchivoTab();
}

// ─── CICLO TAB ─────────────────────────────────────────────
function renderCicloTab() {
  const c = activeCycleData;
  if (!c) return '<div class="loading">Cargando...</div>';
  const s = c.startDate || '';
  const postEnd = addDays(s, 2);
  const voteEnd = addDays(s, 4);
  const watchEnd = addDays(s, 19);

  const phases = [
    { name: 'Postulaciones', start: s, end: postEnd, desc: s ? `Lun ${fmt(s)} → Mié ${fmt(postEnd)}` : 'Por definir' },
    { name: 'Votaciones', start: addDays(postEnd,1), end: voteEnd, desc: s ? `Jue → Vie ${fmt(voteEnd)}` : 'Por definir' },
    { name: 'Ver la película', start: addDays(voteEnd,1), end: watchEnd, desc: s ? `Hasta ${fmt(watchEnd)}` : 'Por definir' },
    { name: 'Reunión y discusión', start: watchEnd, end: addDays(watchEnd,14), desc: c.meetDate ? `📅 ${fmt(c.meetDate)}` : 'Por coordinar' },
  ];

  const phasesHtml = phases.map(p => {
    const st = getPhaseStatus(p.start, p.end);
    const cls = st==='active'?'active-phase':st==='done'?'done-phase':'';
    const tag = st==='active'
      ? '<span class="phase-tag tag-active">En curso</span>'
      : st==='done' ? '<span class="phase-tag tag-done">✓</span>'
      : '<span class="phase-tag tag-next">Próxima</span>';
    return `<div class="phase-row ${cls}">
      <div class="phase-dot"></div>
      <div class="phase-info">
        <div class="phase-name">${p.name}</div>
        <div class="phase-date">${p.desc}</div>
      </div>${tag}</div>`;
  }).join('');

  const activeCycles = allCycles.filter(x => !x.closed);
  const cycleOptions = activeCycles.map(cy =>
    `<option value="${cy.id}" ${cy.id===currentCycleId?'selected':''}>${'Ciclo '+cy.num+' ('+(cy.tipo==='libre'?'libre':'específica')+')'}</option>`
  ).join('');

  // ADMIN SECTION
  let adminHtml = '';
  if (!adminUnlocked) {
    adminHtml = `
      <div class="admin-section ${adminVisible?'visible':''}" id="adminSection">
        <div class="admin-login-box">
          <div class="card-title">Acceso administradora</div>
          <label class="field-label">Contraseña</label>
          <input type="password" id="adminPassInput" placeholder="••••" onkeydown="if(event.key==='Enter')checkAdminPass()">
          <button class="btn btn-primary btn-full" onclick="checkAdminPass()">Entrar</button>
        </div>
      </div>`;
  } else {
    adminHtml = `
      <div class="admin-section visible" id="adminSection">
        <div class="card">
          <div class="card-title">Configurar ciclo activo</div>
          <label class="field-label">Temática</label>
          <input type="text" id="adminTema" value="${c.tema||''}" placeholder="Ej: Protagonista con vendetta personal">
          <div class="date-grid">
            <div><label class="field-label">Lunes de inicio</label><input type="date" id="adminStart" value="${s}"></div>
            <div><label class="field-label">Fecha reunión</label><input type="date" id="adminMeet" value="${c.meetDate||''}"></div>
          </div>
          <button class="btn btn-primary btn-full" onclick="saveAdmin()" style="margin-bottom:10px">Guardar cambios</button>

          <div class="divider"></div>
          <div class="card-title" style="margin-bottom:8px">Votaciones</div>
          <p style="font-size:12px;color:var(--ink-muted);margin-bottom:10px;font-style:italic">Los resultados son secretos hasta que los reveles.</p>
          ${c.votesRevealed
            ? '<button class="btn btn-full" onclick="toggleReveal(false)" style="margin-bottom:10px">🔒 Ocultar resultados de nuevo</button>'
            : '<button class="btn btn-accent btn-full" onclick="toggleReveal(true)" style="margin-bottom:10px">👁 Revelar resultados</button>'
          }

          <div class="divider"></div>
          <div class="card-title" style="margin-bottom:8px">Cerrar y archivar ciclo</div>
          <p style="font-size:12px;color:var(--ink-muted);margin-bottom:10px;font-style:italic">Una vez cerrado, el ciclo pasa al archivo. Asegúrate de haber revelado los resultados primero.</p>
          <button class="btn btn-danger btn-full" onclick="closeCycle()" style="margin-bottom:12px">Cerrar ciclo ${c.num} y archivar</button>

          <div class="divider"></div>
          <div class="card-title" style="margin-bottom:8px">Crear nuevo ciclo</div>
          <label class="field-label">Tipo</label>
          <select id="newCycleTipo" style="margin-bottom:10px">
            <option value="libre">🎲 Temática libre</option>
            <option value="especifica">🎯 Temática específica</option>
          </select>
          <label class="field-label">Temática (si es específica)</label>
          <input type="text" id="newCycleTema" placeholder="Ej: Protagonista se enamora de una criatura extraña">
          <button class="btn btn-accent btn-full" onclick="createCycle()">+ Crear nuevo ciclo</button>

          <div class="notice" style="margin-top:12px">Solo tú ves esta sección. Los cambios se reflejan en tiempo real para todas.</div>
        </div>
      </div>`;
  }

  return `
    <div class="cycle-selector">
      <h3>Ciclo activo</h3>
      <select style="width:auto;margin:0;font-size:12px;padding:6px 10px" onchange="switchCycle(this.value)">${cycleOptions}</select>
    </div>
    <div class="cycle-hero">
      <div class="cycle-num-label">Ciclo ${c.num}</div>
      <div class="cycle-title">${c.tema||(c.tipo==='libre'?'Temática libre':'Define la temática')}</div>
      <span class="tipo-badge ${c.tipo==='libre'?'tipo-libre':'tipo-especifica'}">${c.tipo==='libre'?'🎲 Temática libre':'🎯 Temática específica'}</span>
      ${!s?'<div style="font-size:13px;color:var(--ink-muted);margin-top:10px;font-style:italic">La administradora aún no definió las fechas.</div>':''}
    </div>
    <div class="card">
      <div class="card-title">Fases del ciclo</div>
      <div class="phases">${phasesHtml}</div>
      ${c.meetDate?`<div class="meeting-row"><div class="meeting-dot"></div><div class="meeting-info"><div class="meeting-label">Reunión agendada</div><div class="meeting-date">${fmt(c.meetDate)}</div></div></div>`:''}
    </div>
    <div class="admin-toggle" onclick="toggleAdmin()">⚙️ Modo administradora</div>
    ${adminHtml}
  `;
}

// ─── POSTULAR TAB ──────────────────────────────────────────
function renderPostularTab() {
  if (!activeCycleData) return '<div class="loading">Cargando...</div>';
  const c = activeCycleData;

  const moviesList = movies.length
    ? movies.map((m,i) => `
      <div class="movie-item">
        <div class="movie-rank">${i+1}</div>
        <div class="movie-body">
          <div class="movie-title-text">${m.title}${m.year?` <span class="movie-year">(${m.year})</span>`:''}</div>
          ${m.note?`<div class="movie-note">"${m.note}"</div>`:''}
          ${m.by?`<div class="movie-by">por ${m.by}</div>`:'<div class="movie-by">anónima</div>'}
        </div>
        ${adminUnlocked?`<button class="btn btn-sm btn-danger" onclick="deleteMovie('${m.id}')">✕</button>`:''}
      </div>`).join('')
    : '<div class="empty"><div class="empty-icon">📽</div>Aún no hay postulaciones. ¡Sé la primera!</div>';

  return `
    <div class="card">
      <div class="card-title">Películas postuladas — Ciclo ${c.num}</div>
      ${moviesList}
    </div>
    <div class="card">
      <div class="card-title">Postular película</div>
      <label class="field-label">Título *</label>
      <input type="text" id="movieTitle" placeholder="Título de la película">
      <label class="field-label">Año</label>
      <input type="text" id="movieYear" placeholder="Ej: 1994">
      <label class="field-label">¿Por qué la postulas? (opcional)</label>
      <textarea id="movieNote" placeholder="Cuéntanos..."></textarea>
      <label class="field-label">Tu nombre o alias (opcional — si no pones nada, será anónima)</label>
      <input type="text" id="movieBy" placeholder="Ej: María, Cinéfila anónima...">
      <button class="btn btn-primary btn-full" onclick="addMovie()">Postular película 🎬</button>
    </div>`;
}

// ─── VOTAR TAB ─────────────────────────────────────────────
function renderVotarTab() {
  if (!activeCycleData) return '<div class="loading">Cargando...</div>';
  const c = activeCycleData;

  if (!movies.length) return `<div class="card"><div class="empty"><div class="empty-icon">🗳</div>No hay películas postuladas aún.</div></div>`;

  // Already voted
  if (hasVoted()) {
    const alias = getVotedAlias();
    return `
      <div class="confirmation-box">
        <div class="confirmation-icon">✅</div>
        <div class="confirmation-title">¡Voto registrado!</div>
        <div class="confirmation-sub">${alias && alias !== 'anónima' ? `Gracias, ${alias}.` : 'Tu voto fue registrado de forma anónima.'}<br>Los resultados serán revelados por la administradora.</div>
      </div>
      <div class="notice">Solo puedes votar una vez por ciclo desde este navegador.</div>`;
  }

  const optionsHtml = movies.map(m => `
    <div class="vote-option ${selectedVoteId===m.id?'selected':''}" onclick="selectVote('${m.id}')">
      <div class="vote-radio"></div>
      <div>
        <div class="vote-movie-title">${m.title}</div>
        ${m.year?`<div class="vote-movie-year">${m.year}</div>`:''}
      </div>
    </div>`).join('');

  return `
    <div class="card">
      <div class="card-title">Vota por tu película favorita — Ciclo ${c.num}</div>
      <div class="notice" style="margin-bottom:16px">🔒 Los votos son secretos hasta que la administradora los revele.</div>
      ${optionsHtml}
      <div style="margin-top:6px">
        <label class="field-label">Tu nombre o alias (opcional)</label>
        <input type="text" id="voterAlias" placeholder="Ej: Ana, Cinéfila anónima..." style="margin-bottom:12px">
        <button class="btn btn-primary btn-full" onclick="submitVote()">Registrar mi voto 🗳</button>
      </div>
    </div>`;
}

// ─── RESULTADO TAB ─────────────────────────────────────────
function renderResultadoTab() {
  if (!activeCycleData) return '<div class="loading">Cargando...</div>';
  const c = activeCycleData;

  if (!c.votesRevealed) {
    return `<div class="card">
      <div class="empty">
        <div class="empty-icon">🔒</div>
        Los resultados aún no han sido revelados.<br>
        <span style="font-size:12px;margin-top:6px;display:block">La administradora los revelará al cerrar las votaciones.</span>
      </div>
    </div>`;
  }

  if (!movies.length) return `<div class="card"><div class="empty"><div class="empty-icon">🏆</div>No hay películas para mostrar.</div></div>`;

  const sorted = [...movies].sort((a,b) => (b.votes||0)-(a.votes||0));
  const winner = sorted[0];
  const totalVotes = movies.reduce((a,m) => a+(m.votes||0),0) || 1;

  return `
    <div class="winner-card">
      <div class="winner-trophy">🏆</div>
      <div class="winner-label">Película del Ciclo ${c.num}</div>
      <div class="winner-title">${winner.title}</div>
      ${winner.year?`<div class="winner-year">${winner.year}</div>`:''}
      <div style="font-size:12px;color:var(--accent);margin-top:8px;font-style:italic">${winner.votes||0} voto${(winner.votes||0)!==1?'s':''}</div>
    </div>
    ${sorted.length>1?`<div class="card"><div class="card-title">Resultado completo</div>${
      sorted.slice(1).map((m,i) => {
        const pct = Math.round((m.votes||0)/totalVotes*100);
        return `<div class="movie-item">
          <div class="movie-rank">${i+2}</div>
          <div class="movie-body">
            <div class="movie-title-text">${m.title}${m.year?` <span class="movie-year">(${m.year})</span>`:''}</div>
            <div class="vote-bar-bg"><div class="vote-bar-fill" style="width:${pct}%"></div></div>
            <div class="vote-count">${m.votes||0} votos · ${pct}%</div>
          </div>
        </div>`;
      }).join('')
    }</div>`:''}`;
}

// ─── ARCHIVO TAB ───────────────────────────────────────────
function renderArchivoTab() {
  if (!archivedCycles.length) return `
    <div class="card"><div class="empty"><div class="empty-icon">📁</div>El archivo está vacío.<br><span style="font-size:12px">Aquí aparecerán los ciclos cerrados con su película ganadora.</span></div></div>`;

  return `
    <div class="card">
      <div class="card-title">Ciclos anteriores</div>
      ${archivedCycles.sort((a,b)=>b.num-a.num).map(c => `
        <div class="archive-item">
          <div class="archive-num">${c.num}</div>
          <div class="archive-body">
            <div class="archive-winner-title">🏆 ${c.winnerTitle||'Sin ganadora registrada'}</div>
            <div class="archive-tema">${c.tema||'—'}</div>
            <span class="archive-tipo">${c.tipo==='libre'?'🎲 Libre':'🎯 Específica'}</span>
          </div>
          <button class="btn btn-sm btn-danger" onclick="deleteArchivedCycle('${c.id}',${c.num})" title="Borrar ciclo">✕</button>
        </div>`).join('')}
    </div>`;
}

// ─── GLOBAL ACTIONS ────────────────────────────────────────
window.switchTab = t => { currentTab = t; renderApp(); };
window.switchCycle = id => { currentCycleId = id; setupActiveListeners(); };
window.toggleAdmin = () => { adminVisible = !adminVisible; renderTab(); };

window.checkAdminPass = function() {
  const val = document.getElementById('adminPassInput')?.value;
  if (val === ADMIN_PASS) { adminUnlocked = true; renderTab(); }
  else { showToast('⚠️ Contraseña incorrecta'); }
};

window.saveAdmin = async function() {
  const tema = document.getElementById('adminTema')?.value.trim();
  const start = document.getElementById('adminStart')?.value;
  const meet = document.getElementById('adminMeet')?.value;
  await setDoc(doc(db,'cycles',currentCycleId), { tema, startDate:start, meetDate:meet }, { merge:true });
  showToast('✅ Cambios guardados');
};

window.toggleReveal = async function(reveal) {
  await updateDoc(doc(db,'cycles',currentCycleId), { votesRevealed: reveal });
  showToast(reveal ? '👁 Resultados revelados' : '🔒 Resultados ocultados');
};

window.createCycle = async function() {
  const tipo = document.getElementById('newCycleTipo')?.value;
  const tema = document.getElementById('newCycleTema')?.value.trim();
  const nums = allCycles.map(c=>c.num);
  const nextNum = nums.length ? Math.max(...nums)+1 : 1;
  const newId = `ciclo${nextNum}`;
  await setDoc(doc(db,'cycles',newId), {
    num: nextNum, tipo, tema: tema||(tipo==='libre'?'Temática libre':''),
    startDate:'', meetDate:'', closed:false, votesRevealed:false, createdAt:Date.now()
  });
  showToast(`✅ Ciclo ${nextNum} creado`);
};

window.closeCycle = async function() {
  if (!confirm(`¿Cerrar y archivar el Ciclo ${activeCycleData.num}?`)) return;
  const sorted = [...movies].sort((a,b)=>(b.votes||0)-(a.votes||0));
  const winnerTitle = sorted.length ? sorted[0].title : '';
  await updateDoc(doc(db,'cycles',currentCycleId), { closed:true, winnerTitle });
  showToast(`📁 Ciclo ${activeCycleData.num} archivado`);
  const open = allCycles.filter(c=>!c.closed && c.id!==currentCycleId);
  if (open.length) { currentCycleId = open[open.length-1].id; setupActiveListeners(); }
};

window.deleteArchivedCycle = async function(id, num) {
  const pass = prompt(`Para borrar el Ciclo ${num} del archivo, introduce la contraseña de administradora:`);
  if (pass === null) return;
  if (pass !== ADMIN_PASS) { showToast('⚠️ Contraseña incorrecta'); return; }
  if (!confirm(`¿Borrar permanentemente el Ciclo ${num}? Esta acción no se puede deshacer.`)) return;
  const moviesSnap = await getDocs(collection(db,'cycles',id,'movies'));
  const delPromises = moviesSnap.docs.map(d => deleteDoc(doc(db,'cycles',id,'movies',d.id)));
  await Promise.all(delPromises);
  await deleteDoc(doc(db,'cycles',id));
  showToast(`🗑 Ciclo ${num} eliminado`);
};

window.addMovie = async function() {
  const title = document.getElementById('movieTitle')?.value.trim();
  const year = document.getElementById('movieYear')?.value.trim();
  const note = document.getElementById('movieNote')?.value.trim();
  const by = document.getElementById('movieBy')?.value.trim();
  if (!title) { showToast('⚠️ El título es obligatorio.'); return; }
  await addDoc(collection(db,'cycles',currentCycleId,'movies'), { title, year, note, by:by||'', votes:0, createdAt:Date.now() });
  document.getElementById('movieTitle').value='';
  document.getElementById('movieYear').value='';
  document.getElementById('movieNote').value='';
  document.getElementById('movieBy').value='';
  showToast('🎬 Película postulada');
};

window.deleteMovie = async function(id) {
  if (!confirm('¿Eliminar esta película?')) return;
  await deleteDoc(doc(db,'cycles',currentCycleId,'movies',id));
};

window.selectVote = function(id) {
  selectedVoteId = id;
  renderTab();
};

window.submitVote = async function() {
  if (!selectedVoteId) { showToast('⚠️ Selecciona una película primero.'); return; }
  if (hasVoted()) { showToast('Ya votaste en este ciclo.'); return; }
  const alias = document.getElementById('voterAlias')?.value.trim() || 'anónima';
  const movie = movies.find(m=>m.id===selectedVoteId);
  if (!movie) return;
  await updateDoc(doc(db,'cycles',currentCycleId,'movies',selectedVoteId), { votes: (movie.votes||0)+1 });
  markVoted(alias);
  showToast('✅ Voto registrado');
  renderTab();
};

// ─── TOAST ─────────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 22px;border-radius:30px;font-size:13px;z-index:999;transition:opacity .3s;font-family:Fraunces,serif;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.opacity='0'; }, 2500);
}

// ─── LISTENERS ─────────────────────────────────────────────
function setupActiveListeners() {
  if (unsubCycle) unsubCycle();
  if (unsubMovies) unsubMovies();
  if (!currentCycleId) return;

  unsubCycle = onSnapshot(doc(db,'cycles',currentCycleId), snap => {
    activeCycleData = snap.exists() ? {id:snap.id,...snap.data()} : null;
    if (activeCycleData) document.getElementById('headerBadge').textContent = `Ciclo ${activeCycleData.num}`;
    renderTab();
  });

  unsubMovies = onSnapshot(
    query(collection(db,'cycles',currentCycleId,'movies'), orderBy('createdAt')),
    snap => { movies = snap.docs.map(d=>({id:d.id,...d.data()})); renderTab(); }
  );
}

function setupGlobalListener() {
  if (unsubCycles) unsubCycles();
  unsubCycles = onSnapshot(collection(db,'cycles'), snap => {
    allCycles = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.num-b.num);
    archivedCycles = allCycles.filter(c=>c.closed);
    const open = allCycles.filter(c=>!c.closed);

    if (!currentCycleId || !open.find(c=>c.id===currentCycleId)) {
      if (open.length) { currentCycleId = open[open.length-1].id; setupActiveListeners(); }
    }

    if (allCycles.length===0) {
      setDoc(doc(db,'cycles','ciclo1'), {
        num:1, tipo:'libre', tema:'Temática libre', startDate:'', meetDate:'',
        closed:false, votesRevealed:false, createdAt:Date.now()
      });
    }
    renderApp();
  });
}

renderApp();
setupGlobalListener();
</script>
</body>
</html>
